services:
  customer-ai-runtime:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        CUSTOMER_AI_PIP_EXTRAS: providers
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      CUSTOMER_AI_ENV: ${CUSTOMER_AI_ENV:-prod}
      CUSTOMER_AI_HOST: 0.0.0.0
      CUSTOMER_AI_PORT: 8000
      CUSTOMER_AI_STORAGE_ROOT: /data
      CUSTOMER_AI_LOG_LEVEL: ${CUSTOMER_AI_LOG_LEVEL:-INFO}
      CUSTOMER_AI_LLM_PROVIDER: ${CUSTOMER_AI_LLM_PROVIDER:-local}
      CUSTOMER_AI_ASR_PROVIDER: ${CUSTOMER_AI_ASR_PROVIDER:-local}
      CUSTOMER_AI_TTS_PROVIDER: ${CUSTOMER_AI_TTS_PROVIDER:-local}
      CUSTOMER_AI_VECTOR_PROVIDER: ${CUSTOMER_AI_VECTOR_PROVIDER:-local}
      CUSTOMER_AI_BUSINESS_PROVIDER: ${CUSTOMER_AI_BUSINESS_PROVIDER:-local}
      CUSTOMER_AI_QDRANT_URL: ${CUSTOMER_AI_QDRANT_URL:-http://qdrant:6333}
    volumes:
      - customer-ai-data:/data
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - customer-ai-net

  qdrant:
    image: qdrant/qdrant:v1.15.2
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - customer-ai-net

volumes:
  customer-ai-data:
  qdrant-data:

networks:
  customer-ai-net:
    driver: bridge
